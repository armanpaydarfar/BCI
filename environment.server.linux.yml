# Perception GPU server — Linux host.
#
# Role = "server": runs the perception stack only (vlm_service.py + the live
# perception/ modules: FastSAM segmentation, Depth Pro, Gemini/OpenAI intent
# reasoning, Neon live reader). It does NOT run device I/O, the EEG/LSL
# decoder pipeline, or the Qt control panel — those live in the "control"
# superset env (environment.yml, Linux operator host). Frames arrive over the
# TCP relay (PERCEPTION_FRAME_SOURCE=remote); results go back over UDP.
#
# This is the perception-only subset of environment.yml (conda-forge numerical
# core + pip perception layer), plus a CUDA torch build. Core versions are
# pinned to match the control env so a single-box dev machine stays consistent.
#
# CUDA: torch/torchvision come from the PyTorch wheel index. cu124 covers
# modern Linux drivers; bump the index tag (cu121/cu126/cu128…) to match this
# box's installed driver. This is the per-OS knob — the rest mirrors the
# Windows server file.
name: harmony-server
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12.7
  - numpy=1.26.4        # <2: depth-pro and the conda-forge pyriemann build need it
  - scipy=1.14.1
  - pillow=11.0.0
  - tqdm=4.67.0
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - torch
      - torchvision
      - opencv-python
      - ultralytics>=8.2
      - timm
      - openai>=1.30
      - google-genai
      - pupil-labs-realtime-api>=1.4
      - depth-pro @ git+https://github.com/apple/ml-depth-pro.git@9efe5c1def37a26c5367a71df664b18e1306c708
