# Unified Harmony env — one curated, cross-platform superset for BOTH roles.
#
# Every unit installs the SAME full dependency set, so every module imports on
# every host. "Role" is now *what you run*, not *what's installed*:
#   control  Linux operator host — device I/O (Neon, EEG, FES, robot), the
#            EEG/LSL decoder pipeline, the Qt control panel, gaze, and (single-box
#            default, PERCEPTION_FRAME_SOURCE=local) the perception stack.
#   server   GPU perception host (Linux or Windows) — runs perception only, but
#            carries the full env. No env difference from control at all.
#
# Cross-platform by construction: this is a CURATED spec (not a frozen export),
# conda-forge-only with no OS-pinned packages, so conda solves the per-OS
# transitive closure and pip selects the right platform wheel automatically. One
# file therefore creates on both Linux and native Windows. Linux remains the only
# realtime/control platform (CLAUDE.md); a Windows host is server-only in practice
# even though the env installs everywhere.
#
# Pinning policy (decided 2026-06-16): only the numerical/decoder CORE is pinned
# exactly — drift there compounds over SPD-matrix training (CLAUDE.md). Everything
# else floats to whatever conda-forge resolves per platform; that float is what
# lets a single file co-solve on Linux and Windows.
#
# Channels: conda-forge only. The conda-forge pyriemann 0.8 build runs on
# numpy 1.26.4 (the PyPI wheel pins numpy>=2 and collides with depth-pro's
# numpy<2), and conda-forge-only avoids the Anaconda defaults-channel ToS gate.
# `nodefaults` blocks fallback to defaults. NOTE: recent conda (24+/26+) ToS-
# pre-flights the *globally configured* channels before honoring this file, so a
# `defaults`-configured install aborts — fix with conda-forge config (the
# bootstrap script warns). See the WS3 decision doc.
#
# torch — no role knob needed. The default PyPI torch/torchvision wheel is
# already a CUDA build (currently cu13x) that ALSO runs on CPU, so a plain
# `conda env create` gives a working torch on both a GPU server (CUDA-accelerated)
# and a CPU-only control box (cuda.is_available()=False, runs on CPU). Validated
# 2026-06-16 on a Windows/WSL2 RTX 4070 Ti host: plain create → torch 2.12.0+cu130,
# CUDA-True. OPTIONAL overrides (neither is required): a CPU-only host that wants
# to avoid the ~GB CUDA download can `pip install --force-reinstall --index-url
# https://download.pytorch.org/whl/cpu torch torchvision`; a host whose driver
# needs an older CUDA series can swap `cpu` for e.g. `cu124`.
#
# Create:  conda env create -f environment.yml          (or via tools/bootstrap_machine.sh)
name: lsl
channels:
  - conda-forge
  - nodefaults
dependencies:
  # ── Numerical / decoder core — PINNED exactly (CLAUDE.md numerical care) ──
  - python=3.12.7
  - numpy=1.26.4        # <2: depth-pro and the conda-forge pyriemann build need it
  - scipy=1.14.1
  - scikit-learn=1.5.2
  - pyriemann=0.8
  # ── Everything else floats to the per-OS conda-forge solve ──
  - pandas<3            # range guard, not a freeze: pandas 3.0 is a breaking major vs the 2.x the analysis scripts were written against; floating otherwise
  - mne-base            # core MNE; the full `mne` metapackage's 3D/source extras (pyvista/vtk/dipy/nibabel/nilearn) are unused here
  - matplotlib-base
  - seaborn
  - h5py
  - pyxdf
  - liblsl              # native LSL library that the pip `pylsl` wrapper loads at import; not bundled in the pylsl 1.16.2 wheel, so it must come from conda-forge
  - tqdm
  - xgboost             # live online `xgb_cov` decoder (runtime_common.py); unpickles + runs XGBClassifier at query time
  - pyside6             # Qt control panel (control_panel.py) + matplotlib Qt backend
  - pytest              # tests/ + the .githooks pre-commit gate
  - pip
  - pip:
      - pylsl==1.16.2   # PINNED: realtime API stability. The drivers + Tier-1 stream files call the deprecated `resolve_stream(...)`, which pylsl 1.17+ REMOVED (renamed `resolve_streams`). Migrating that across 11 realtime files is out of scope; hold the known-good version.
      - pyserial        # FES/Arduino serial I/O
      - pygame          # experiment-driver stimulus/UI
      # ── Perception layer (WS3 fold: FastSAM + Depth Pro + Gemini) ─────────
      # conda above provides the numerical core; these add the perception-only
      # deps. torch/torchvision pull the default PyPI wheel (a CUDA build that
      # also runs on CPU) — see the torch note in the header.
      # Omitted on purpose: dt-apriltags / pyrealsense2 / piper / msgpack /
      # pyzmq are used only by STAGED perception modules (not import-safe yet,
      # fenced in perception/__init__.py); efficient_sam / segment_anything are
      # an optional non-default segmentation backend in object_detector.py.
      # `pip check` shows one expected false-positive (pyriemann PyPI metadata
      # wants numpy>=2 vs the conda-forge build's 1.26.4) — do not "fix" it.
      - torch
      - torchvision
      - opencv-python   # cv2 — hard import in the live object_detector/depth_estimator
      - ultralytics>=8.2
      - timm            # depth-pro runtime dep (its git install under-declares it)
      - openai>=1.30    # alternate VLM backend; Gemini (google-genai) is the default
      - google-genai
      - pupil-labs-realtime-api>=1.4
      - depth-pro @ git+https://github.com/apple/ml-depth-pro.git@9efe5c1def37a26c5367a71df664b18e1306c708
